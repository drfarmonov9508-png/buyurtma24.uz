version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: buyurtma24_postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - buyurtma24_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: buyurtma24_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - buyurtma24_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: buyurtma24_backend
    restart: always
    env_file: .env
    volumes:
      - uploads_data:/app/uploads
    networks:
      - buyurtma24_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: buyurtma24_frontend
    restart: always
    env_file: .env
    networks:
      - buyurtma24_network
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: buyurtma24_nginx
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - uploads_data:/var/www/uploads:ro
    networks:
      - buyurtma24_network
    depends_on:
      - backend
      - frontend

networks:
  buyurtma24_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads_data:
